<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그것이 알고싶캄몬</title>
  <style>
    :root{--bg:#030406;--panel:rgba(10,11,14,.86);--panel2:rgba(18,19,24,.94);--line:rgba(255,255,255,.14);--line2:rgba(255,255,255,.08);--text:#f4f4f5;--muted:#9b9da6;--red:#e31f2c;--red2:#ff3344;--blue:#9bb8ff;--shadow:0 22px 70px rgba(0,0,0,.72)}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:#020306;color:var(--text);font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{background:radial-gradient(circle at 12% 0%,rgba(138,0,18,.18),transparent 34%),radial-gradient(circle at 92% 12%,rgba(210,40,38,.08),transparent 35%),linear-gradient(180deg,#05060a 0%,#020306 100%)}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.09;background:repeating-linear-gradient(0deg,rgba(255,255,255,.22) 0 1px,transparent 1px 4px);mix-blend-mode:screen}
    a{color:inherit;text-decoration:none}.wrap{width:min(1120px,calc(100% - 28px));margin:0 auto;padding:18px 0 42px}.hero{width:100%;margin:0 0 18px;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:#020306;box-shadow:var(--shadow)}.hero img{width:100%;height:auto;display:block;object-fit:cover}
    .tabs-wrap{margin-top:18px;padding:0;border:1px solid var(--line2);border-radius:18px;background:rgba(8,9,13,.72);box-shadow:0 14px 34px rgba(0,0,0,.35)}.tabs{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:9px;padding:10px;overflow:visible}.tab{min-width:0;border:1px solid rgba(255,255,255,.15);color:#e1e2e6;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.032));border-radius:999px;padding:12px 7px;font-size:13px;font-weight:950;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:inset 0 1px 0 rgba(255,255,255,.08);transition:.14s ease}.tab:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.28)}.tab.active{color:#fff;border-color:rgba(255,66,76,.95);background:linear-gradient(135deg,#e51f2d,#8d121d);box-shadow:0 10px 24px rgba(227,31,44,.28),inset 0 1px 0 rgba(255,255,255,.18)}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin:16px 0}.search{width:100%;border:1px solid rgba(255,255,255,.15);border-radius:17px;padding:14px 16px;outline:none;color:var(--text);background:rgba(255,255,255,.055);font-size:14px;font-weight:800}.search::placeholder{color:rgba(230,234,245,.48)}.meta-status{white-space:nowrap;color:#bfc6da;font-size:13px;font-weight:900}
    .list{display:grid;gap:11px}.post{position:relative;overflow:hidden;display:grid;grid-template-columns:74px 1fr auto;gap:14px;align-items:center;padding:16px;border:1px solid rgba(255,255,255,.11);border-radius:20px;background:linear-gradient(135deg,rgba(255,255,255,.065),rgba(255,255,255,.02)),var(--panel);box-shadow:0 12px 34px rgba(0,0,0,.22);transition:.14s ease}.post:hover{transform:translateY(-2px);border-color:rgba(231,51,63,.42);background:linear-gradient(135deg,rgba(231,51,63,.12),rgba(255,255,255,.025)),var(--panel2)}.case-no{width:62px;height:62px;border-radius:18px;display:grid;place-items:center;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);color:#ff5c66;font-weight:1000;letter-spacing:-.5px}.post-title{display:block;color:#fff;font-size:16px;line-height:1.42;font-weight:950;word-break:keep-all}.post-title:hover{text-decoration:underline;text-decoration-color:#ff5c66}.post-meta{margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:12px;font-weight:850}.metric{display:inline-flex;align-items:center;gap:4px}.badge-zone{display:flex;flex-direction:column;align-items:flex-end;gap:7px}.hot-badge{border-radius:999px;padding:7px 10px;color:#fff;background:rgba(231,51,63,.22);border:1px solid rgba(231,51,63,.48);font-size:12px;font-weight:1000}.open-badge{color:var(--blue);font-size:12px;font-weight:900}.empty{padding:40px 20px;text-align:center;border:1px dashed rgba(255,255,255,.16);border-radius:22px;color:var(--muted);background:rgba(255,255,255,.035);font-weight:850}.footer{margin-top:22px;text-align:center;color:rgba(220,225,238,.54);font-size:12px;font-weight:800}
    @media(max-width:760px){.wrap{width:min(100% - 18px,1120px);padding-top:10px}.tabs{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.tab{font-size:12px;padding:9px 7px}.toolbar{grid-template-columns:1fr}.post{grid-template-columns:48px 1fr;padding:13px;border-radius:17px}.case-no{width:44px;height:44px;border-radius:13px;font-size:12px}.post-title{font-size:14px}.badge-zone{grid-column:2;align-items:flex-start;flex-direction:row}}

    
    @media(max-width:760px){
      .quick-links{top:10px;left:10px;right:10px;flex-direction:row}
      .quick-link-btn{flex:1;font-size:12px;padding:10px 12px}
    }
}

  
    .left-shortcuts{
      position:fixed;
      left:16px;
      top:16px;
      width:390px;
      z-index:20;
      border-radius:0;
      overflow:hidden;
    }
    .left-shortcuts-img{
      width:100%;
      display:block;
      user-select:none;
      pointer-events:none;
    }
    .left-shortcut-hit{
      position:absolute;
      top:0;
      height:100%;
      display:block;
      cursor:pointer;
    }
    .left-shortcut-status{left:0;width:49%}
    .left-shortcut-schedule{right:0;width:49%}
    @media(max-width:1480px){
      .left-shortcuts{position:static;width:min(416px,calc(100% - 20px));margin:10px auto 8px}
    }

    @media(min-width:1481px){
      .wrap{
        width:min(1120px,calc(100% - 460px - 28px));
        margin-left:440px;
        margin-right:auto;
      }
    }

  
    .left-shortcuts{
      position:fixed;
      left:18px;
      top:18px;
      width:430px;
      z-index:30;
    }
    .left-shortcuts-img{
      width:100%;
      height:auto;
      display:block;
      border-radius:18px;
      user-select:none;
      pointer-events:none;
    }
    .left-shortcut-hit{
      position:absolute;
      top:0;
      height:106px;
      display:block;
      cursor:pointer;
    }
    .left-shortcut-status{
      left:0;
      width:49%;
    }
    .left-shortcut-schedule{
      right:0;
      width:49%;
    }

    @media(min-width:1480px){
      .wrap{
        width:min(1120px,calc(100% - 520px));
        margin-left:500px;
        margin-right:auto;
      }
    }

    @media(max-width:1479px){
      .left-shortcuts{
        position:relative;
        width:430px;
        margin:16px auto 12px;
        left:auto;
        top:auto;
      }
      .wrap{
        width:min(1120px,calc(100% - 28px));
        margin:0 auto;
      }
    }

    @media(max-width:520px){
      .left-shortcuts{
        width:calc(100% - 16px);
      }
      .left-shortcut-hit{
        height:24vw;
      }
    }

</style>
</head>

  <script>
    const DATA_URL='./data/posts.json?ts='+Date.now();
    const DEFAULT_TABS=[{id:'all',name:'전체'},{id:'top100',name:'탑100'},{id:'cammonstars',name:'캄몬스타즈'},{id:'kimyunhwan',name:'김윤환'},{id:'coaches',name:'코치진'},{id:'tomato',name:'토마토'},{id:'jidudu',name:'지두두'},{id:'sunshine',name:'햇살'},{id:'jjiking',name:'찌킹'},{id:'soju',name:'소주양'},{id:'chiri',name:'치리'},{id:'juharang',name:'주하랑'},{id:'imjoy',name:'임조이'},{id:'vitaming',name:'비타밍'},{id:'arisong',name:'아리송이'},{id:'meonjin',name:'먼진'},{id:'peanut',name:'진땅콩'},{id:'nangni',name:'낭니'}];
    const MEMBER_RULES=[['cammonstars',['캄몬','캄몬스타즈','몬스타즈','kammon','monstarz','calm']],['kimyunhwan',['김윤환','와치','센세']],['coaches',['코치','사테','다린','이경민']],['tomato',['토마토']],['jidudu',['지두두','두두','jidudu']],['sunshine',['햇살']],['jjiking',['찌킹']],['soju',['소주양','소주']],['chiri',['치리']],['juharang',['주하랑']],['imjoy',['임조이','조이']],['vitaming',['비타밍']],['arisong',['아리송이','아리']],['meonjin',['먼진']],['peanut',['진땅콩','땅콩']],['nangni',['낭니']]];
    const GROUP_TO_TAB={'캄몬스타즈':'cammonstars','김윤환':'kimyunhwan','코치진':'coaches','토마토':'tomato','지두두':'jidudu','햇살':'sunshine','찌킹':'jjiking','소주양':'soju','치리':'chiri','주하랑':'juharang','임조이':'imjoy','비타밍':'vitaming','아리송이':'arisong','먼진':'meonjin','진땅콩':'peanut','낭니':'nangni'};
    let rawData={tabs:DEFAULT_TABS,items:[]},activeTab='all',searchText='';
    const $=s=>document.querySelector(s); const esc=v=>String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); const fmt=v=>{const n=Number(v||0);return Number.isFinite(n)?n.toLocaleString('ko-KR'):'0'};
    function normalizeInput(json){
      if(Array.isArray(json)) return json.map(u=> typeof u==='string'?{url:u}:u);
      if(Array.isArray(json.items)) return json.items;
      if(Array.isArray(json.urls)){
        if(json.urls.length && json.urls[0] && Array.isArray(json.urls[0].items)) return json.urls.flatMap(x=>x.items||[]);
        return json.urls.map(u=> typeof u==='string'?{url:u}:u);
      }
      return [];
    }
    function cacheKey(url){return 'kammon_url_meta_v2:'+url}
    async function fetchText(url){
      const targets=[url,'https://r.jina.ai/http://r.jina.ai/http://'+url.replace(/^https?:\/\//,''),'https://r.jina.ai/http://'+url.replace(/^https?:\/\//,'')];
      for(const target of targets){try{const r=await fetch(target,{cache:'no-store'}); if(r.ok){const t=await r.text(); if(t&&t.length>60) return t;}}catch(e){}}
      return '';
    }
    function extractMetaFromHtml(url,html){
      const text=String(html||''); const get=(re)=>{const m=text.match(re);return m?m[1].replace(/\s+/g,' ').trim():''};
      let title=get(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)/i)||get(/<title[^>]*>([^<]+)/i)||get(/^Title:\s*(.+)$/im)||'';
      title=title.replace(/\s*-\s*에펨코리아.*$/,'').replace(/\s*-\s*FMKOREA.*$/i,'').trim();
      const desc=get(/<meta[^>]+property=["']og:description["'][^>]+content=["']([^"']+)/i)||'';
      const merged=(title+' '+desc+' '+url).toLowerCase();
      let tabs=['all']; MEMBER_RULES.forEach(([id,keys])=>{if(keys.some(k=>merged.includes(k.toLowerCase()))) tabs.push(id)}); if(tabs.length===1) tabs.push('cammonstars');
      const likes=Number((text.match(/(?:추천|like)[^0-9]{0,20}([0-9,]+)/i)||[])[1]?.replaceAll(',','')||0);
      const comments=Number((text.match(/(?:댓글|comment)[^0-9]{0,20}([0-9,]+)/i)||[])[1]?.replaceAll(',','')||0);
      const views=Number((text.match(/(?:조회|view)[^0-9]{0,20}([0-9,]+)/i)||[])[1]?.replaceAll(',','')||0);
      if(likes>=100) tabs.push('top100');
      return {title:title||('FMKOREA 글 '+(url.match(/\/(\d+)(?:\?|$)/)||[])[1]||url),url,date:new Date().toLocaleString('ko-KR'),likes,comments,views,tabs:[...new Set(tabs)],timestamp:Date.now()};
    }
    async function enrichPost(post,i){
      const url=String(post.url||post.link||post).trim();
      if(post.title){
        const groupTabs=Array.isArray(post.matchedGroups)?post.matchedGroups.map(g=>GROUP_TO_TAB[g]).filter(Boolean):[];
        const tabs=[...new Set(['all', ...groupTabs])];
      if (Number(post.likes || 0) >= 100) tabs.push('top100');
        const comments=(String(post.title).match(/\[([0-9,]+)\]\s*$/)||[])[1]?.replaceAll(',','')||0;
        return {
          ...post,
          id:i+1,
          url,
          date:post.postedText || post.displayTime || post.postedAtText || post.date || '',
          comments:Number(comments),
          likes:Number(post.likes||0),
          views:Number(post.views||0),
          tabs:[...new Set(tabs)],
          timestamp:Number(post.sortOrder || i + 1)
        };
      }
      if(post.tabs) return {...post,id:i+1};
      const cached=localStorage.getItem(cacheKey(url)); if(cached){try{return {...JSON.parse(cached),id:i+1}}catch(e){}}
      const html=await fetchText(url); const meta=extractMetaFromHtml(url,html); meta.id=i+1; localStorage.setItem(cacheKey(url),JSON.stringify(meta)); return meta;
    }
    function getPostsByTab(id){
  const items = rawData.items || [];

  // 추천수 100 이상만 TOP100
  if(id === 'top100') {
    return items
      .filter(p => Number(p.likes || 0) >= 100)
      .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
  }

  return items.filter(
    p => Array.isArray(p.tabs) && p.tabs.includes(id)
  );
}
    function getVisiblePosts(){const q=searchText.trim().toLowerCase(); return getPostsByTab(activeTab).filter(p=>!q||String(p.title||'').toLowerCase().includes(q)).sort((a,b)=> activeTab==='top100'?Number(a.timestamp||0)-Number(b.timestamp||0):Number(a.timestamp||0)-Number(b.timestamp||0));}
    function renderTabs(){const el=$('#tabs'); el.innerHTML=DEFAULT_TABS.map(t=>`<button class="tab ${t.id===activeTab?'active':''}" data-tab="${t.id}">${esc(t.name)}</button>`).join(''); el.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;render();});}
    function renderList(){const posts=getVisiblePosts(); const name=DEFAULT_TABS.find(t=>t.id===activeTab)?.name||'전체'; $('#status').textContent=`${name} · ${posts.length.toLocaleString('ko-KR')}건`; if(!posts.length){$('#list').innerHTML='<div class="empty">현재 조건에 맞는 인기글이 없습니다.</div>';return;} $('#list').innerHTML=posts.map((p,i)=>`<article class="post"><div class="case-no">#${String(i+1).padStart(3,'0')}</div><div><a class="post-title" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer">${esc(p.title)}</a><div class="post-meta"><span class="metric">🕒 ${esc(p.date||'-')}</span><span class="metric">👍 ${fmt(p.likes)}</span><span class="metric">💬 ${fmt(p.comments)}</span><span class="metric">👁 ${fmt(p.views)}</span></div></div><div class="badge-zone">${Number(p.likes||0)>=100?'<span class="hot-badge">TOP100</span>':''}<span class="open-badge">원문 보기 ↗</span></div></article>`).join('');}
    function render(){renderTabs();renderList();}
    async function init(){try{const r=await fetch(DATA_URL,{cache:'no-store'}); if(!r.ok) throw new Error('json fail'); const json=await r.json(); const base=normalizeInput(json); $('#status').textContent=`${base.length}개 불러오는 중...`; const items=[]; for(let i=0;i<base.length;i++){ $('#status').textContent=`${i+1}/${base.length} 불러오는 중...`; items.push(await enrichPost(base[i],i)); rawData={tabs:DEFAULT_TABS,items}; render(); } rawData={tabs:DEFAULT_TABS,items}; render();}catch(e){rawData={tabs:DEFAULT_TABS,items:[]}; renderTabs(); $('#status').textContent='로드 실패'; $('#list').innerHTML='<div class="empty">data/posts.json을 불러오지 못했습니다. 로컬은 Live Server 같은 서버로 열어주세요.</div>';}}
    $('#search').addEventListener('input',e=>{searchText=e.target.value;renderList();}); init();
  </script>
</body>
</html>
